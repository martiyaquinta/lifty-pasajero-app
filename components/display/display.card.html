<!-- @dsCard group="Components" viewport="700x240" name="Display: Avatar, Card, Stars" subtitle="Avatar initials + image, Card surfaces, StarRating picker" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; font-family: var(--font-sans); background: #F4F7FA; padding: 20px; }
  .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 16px; }
  .label { font-size: 10px; font-weight: 600; color: #888; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Avatar, Card, StarRating } = window.LiftyDesignSystem_00f0c3;
function Demo() {
  const [rating, setRating] = React.useState(4);
  return (
    <div>
      <div className="label">Avatar — xs sm md lg xl</div>
      <div className="row">
        {['xs','sm','md','lg','xl'].map(s => <Avatar key={s} name="Carlos M." size={s} />)}
        {['Martina','Roberto','Ana','Diego'].map(n => <Avatar key={n} name={n} size="md" />)}
      </div>
      <div className="label">Card surfaces</div>
      <div className="row" style={{ alignItems: 'stretch' }}>
        <Card padding="sm" style={{ fontSize: 13, color: '#0D1F2D', minWidth: 130 }}>
          <div style={{ fontWeight: 600 }}>Lifty Standard</div>
          <div style={{ color: '#888', fontSize: 12, marginTop: 2 }}>4 pasajeros · 3 min</div>
          <div style={{ color: '#00C2B3', fontWeight: 700, marginTop: 6 }}>$2.000</div>
        </Card>
        <Card variant="subtle" padding="sm" style={{ fontSize: 13, color: '#0D1F2D', minWidth: 130 }}>
          <div style={{ fontWeight: 600 }}>Terminal de Ómnibus</div>
          <div style={{ color: '#888', fontSize: 12, marginTop: 2 }}>Av. Circunvalación · 1.2 km</div>
        </Card>
        <Card variant="dark" padding="sm" style={{ fontSize: 13, color: '#fff', minWidth: 130 }}>
          <div style={{ fontWeight: 600 }}>Carlos M.</div>
          <div style={{ color: '#8899AA', fontSize: 12, marginTop: 2 }}>Chevrolet Prisma · ABC 123</div>
          <div style={{ color: '#F5A623', fontSize: 12, marginTop: 4 }}>⭐ 4.8</div>
        </Card>
      </div>
      <div className="label">StarRating — interactive</div>
      <div className="row" style={{ gap: 20 }}>
        <StarRating value={rating} onChange={setRating} size="lg" />
        <StarRating value={4.5} readonly size="sm" />
        <span style={{ fontSize: 14, color: '#555' }}>Calificación: {rating}/5</span>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
