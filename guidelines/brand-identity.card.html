<!-- @dsCard group="Brand" viewport="700x180" name="Brand Identity" subtitle="Lifty — Movilidad que te eleva. Official logo, palette and tagline." -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family:var(--font-sans); display:flex; height:180px; }
  .dark { background:#0D1F2D; flex:1.5; display:flex; align-items:center; padding:0 32px; gap:24px; }
  .light { background:#F4F7FA; flex:1; display:flex; flex-direction:column; justify-content:center; padding:0 28px; gap:10px; }
  .divider { width:1px; background:rgba(255,255,255,.1); align-self:stretch; margin:24px 0; }
  .chip { display:inline-flex; align-items:center; gap:6px; background:#E8F8F6; border-radius:20px; padding:4px 12px; font-size:12px; font-weight:600; color:#00C2B3; width:fit-content; }
  .cta-preview { height:40px; background:#00C2B3; border-radius:9999px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#fff; letter-spacing:.10em; padding:0 20px; width:fit-content; }
</style>
</head>
<body>
  <div class="dark">
    <!-- Isotipo SVG -->
    <svg width="52" height="65" viewBox="0 0 64 80" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M 32 20 A 12 12 0 1 0 20 32 L 20 58 Q 20 68 30 68 L 54 68"
        stroke="#00C2B3" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
    <div>
      <div style="font-size:34px;font-weight:700;color:#fff;line-height:1.1;letter-spacing:-0.5px">Lifty</div>
      <div style="font-size:13px;color:#8899AA;margin-top:4px">Movilidad que <span style="color:#00C2B3;font-weight:600">te eleva.</span></div>
    </div>
    <div class="divider"></div>
    <div style="display:flex;flex-direction:column;gap:6px">
      <div style="font-size:10px;color:#556677;font-weight:600;letter-spacing:.07em;text-transform:uppercase;margin-bottom:2px">Paleta oficial</div>
      <div style="display:flex;gap:6px">
        <div style="width:28px;height:28px;border-radius:8px;background:#00C2B3;title:'#00C2B3'"></div>
        <div style="width:28px;height:28px;border-radius:8px;background:#0D1F2D;border:1px solid #1A2F45"></div>
        <div style="width:28px;height:28px;border-radius:8px;background:#F5A623"></div>
        <div style="width:28px;height:28px;border-radius:8px;background:#FF4D4D"></div>
        <div style="width:28px;height:28px;border-radius:8px;background:#FFFFFF;border:1px solid #E4E9EE"></div>
      </div>
      <div style="font-size:10px;color:#556677;margin-top:2px">Turquesa · Navy · Amarillo · Rojo · Blanco</div>
    </div>
  </div>
  <div class="light">
    <div class="chip">Villa Dolores, Córdoba 🇦🇷</div>
    <div style="font-size:13px;color:#555;line-height:1.5">Cercana · Simple · Confiable · Local</div>
    <div class="cta-preview">PEDIR VIAJE</div>
  </div>
</body>
</html>
