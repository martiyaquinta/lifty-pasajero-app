<!-- @dsCard group="Colors" viewport="700x120" name="Brand Primary" subtitle="Teal — primary CTA, active states, pins, accents" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-base); display: flex; gap: 0; height: 120px; }
  .swatch { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px 12px; }
  .label { font-size: 11px; font-weight: 600; }
  .hex   { font-size: 10px; opacity: 0.7; margin-top: 2px; }
</style>
</head>
<body>
  <div class="swatch" style="background:#00C2B3"><span class="label" style="color:#fff">Brand Teal</span><span class="hex" style="color:#fff">#00C2B3</span></div>
  <div class="swatch" style="background:#E8F8F6"><span class="label" style="color:#00C2B3">Teal Light</span><span class="hex" style="color:#00C2B3">#E8F8F6</span></div>
  <div class="swatch" style="background:rgba(0,194,179,0.13)"><span class="label" style="color:#00C2B3">Teal Dim</span><span class="hex" style="color:#00C2B3">13% alpha</span></div>
  <div class="swatch" style="background:#0D1F2D"><span class="label" style="color:#fff">Brand Navy</span><span class="hex" style="color:#8899AA">#0D1F2D</span></div>
  <div class="swatch" style="background:#0D2B45"><span class="label" style="color:#fff">Navy Mid</span><span class="hex" style="color:#8899AA">#0D2B45</span></div>
  <div class="swatch" style="background:#1A2F45"><span class="label" style="color:#fff">Navy 2</span><span class="hex" style="color:#8899AA">#1A2F45</span></div>
  <div class="swatch" style="background:#1E3A5F"><span class="label" style="color:#fff">Navy 3</span><span class="hex" style="color:#8899AA">#1E3A5F</span></div>
</body>
</html>
