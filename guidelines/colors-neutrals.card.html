<!-- @dsCard group="Colors" viewport="700x120" name="Neutral Palette" subtitle="Greys used for text, borders, surfaces and disabled states" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: #F4F7FA; display: flex; gap: 0; height: 120px; }
  .swatch { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px 10px; }
  .label { font-size: 10px; font-weight: 600; }
  .hex   { font-size: 9px; opacity: 0.6; margin-top: 2px; }
</style>
</head>
<body>
  <div class="swatch" style="background:#FFFFFF; border: 1px solid #E4E9EE"><span class="label" style="color:#333">0</span><span class="hex" style="color:#888">#FFF</span></div>
  <div class="swatch" style="background:#F4F7FA"><span class="label" style="color:#333">50</span><span class="hex" style="color:#888">#F4F7FA</span></div>
  <div class="swatch" style="background:#E4E9EE"><span class="label" style="color:#333">100</span><span class="hex" style="color:#888">#E4E9EE</span></div>
  <div class="swatch" style="background:#DDDDDD"><span class="label" style="color:#333">200</span><span class="hex" style="color:#888">#DDD</span></div>
  <div class="swatch" style="background:#BBBBBB"><span class="label" style="color:#333">300</span><span class="hex" style="color:#555">#BBB</span></div>
  <div class="swatch" style="background:#888888"><span class="label" style="color:#fff">500</span><span class="hex" style="color:#ddd">#888</span></div>
  <div class="swatch" style="background:#555555"><span class="label" style="color:#fff">700</span><span class="hex" style="color:#ddd">#555</span></div>
  <div class="swatch" style="background:#333333"><span class="label" style="color:#fff">900</span><span class="hex" style="color:#ddd">#333</span></div>
  <div class="swatch" style="background:#0D1F2D"><span class="label" style="color:#fff">Navy</span><span class="hex" style="color:#8899AA">#0D1F2D</span></div>
</body>
</html>
