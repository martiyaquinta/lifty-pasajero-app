<!-- @dsCard group="Spacing" viewport="700x140" name="Radii & Elevation" subtitle="Border radii from xs (4px) to full pill; shadow elevation scale" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: #F4F7FA; display: flex; align-items: center; padding: 16px 20px; gap: 12px; box-sizing: border-box; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 52px; height: 40px; background: #00C2B3; }
  .label { font-size: 10px; color: #555; text-align: center; line-height: 1.3; }
  .divider { width: 1px; height: 60px; background: #E4E9EE; margin: 0 4px; }
  .shadow-box { width: 60px; height: 36px; background: #fff; border-radius: 8px; }
</style>
</head>
<body>
  <div class="item"><div class="box" style="border-radius:4px"></div><div class="label">xs<br>4px</div></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="label">sm<br>8px</div></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><div class="label">md<br>12px</div></div>
  <div class="item"><div class="box" style="border-radius:16px"></div><div class="label">lg<br>16px</div></div>
  <div class="item"><div class="box" style="border-radius:20px"></div><div class="label">xl<br>20px</div></div>
  <div class="item"><div class="box" style="border-radius:24px"></div><div class="label">2xl<br>24px</div></div>
  <div class="item"><div class="box" style="border-radius:9999px"></div><div class="label">full<br>pill</div></div>
  <div class="divider"></div>
  <div class="item"><div class="shadow-box" style="box-shadow:0 1px 3px rgba(13,31,45,0.08),0 1px 2px rgba(13,31,45,0.06)"></div><div class="label">sm<br>subtle</div></div>
  <div class="item"><div class="shadow-box" style="box-shadow:0 4px 12px rgba(13,31,45,0.10),0 1px 4px rgba(13,31,45,0.06)"></div><div class="label">md<br>card</div></div>
  <div class="item"><div class="shadow-box" style="box-shadow:0 8px 24px rgba(13,31,45,0.12),0 2px 8px rgba(13,31,45,0.08)"></div><div class="label">lg<br>sheet</div></div>
  <div class="item"><div class="shadow-box" style="box-shadow:0 4px 20px rgba(0,194,179,0.35)"></div><div class="label">brand<br>glow</div></div>
</body>
</html>
