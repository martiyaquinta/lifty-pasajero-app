<!-- @dsCard group="Type" viewport="700x160" name="CTA & Button Text" subtitle="Button copy style — uppercase, semibold, letter-spaced. Always Spanish." -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: #F4F7FA; display: flex; align-items: center; gap: 12px; padding: 20px; box-sizing: border-box; flex-wrap: wrap; }
  .btn { height: 52px; padding: 0 24px; border-radius: 9999px; display: flex; align-items: center; font-weight: 700; font-size: 14px; letter-spacing: 0.1em; text-transform: uppercase; border: none; cursor: default; }
</style>
</head>
<body>
  <div class="btn" style="background:#00C2B3;color:#fff">PEDIR VIAJE</div>
  <div class="btn" style="background:#00C2B3;color:#fff">SOLICITAR VIAJE · $2.000</div>
  <div class="btn" style="background:#00C2B3;color:#fff">CONFIRMAR Y SALIR</div>
  <div class="btn" style="background:#0D1F2D;color:#fff">CONTINUAR</div>
  <div class="btn" style="background:#fff;color:#0D1F2D;box-shadow:0 1px 4px rgba(13,31,45,0.1)">Seguir con el viaje</div>
  <div class="btn" style="background:transparent;color:#FF4D4D;border:1.5px solid #FF4D4D">Cancelar viaje</div>
</body>
</html>
